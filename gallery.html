<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--black:#0a0a0a;
--white:#ffffff;
--accent:#b8a070;
--mid:#888880;
}

body{
font-family:'Jost',sans-serif;
background:var(--black);
color:var(--white);
overflow:hidden;
min-height:100vh;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
padding:30px 5vw;
display:flex;
justify-content:space-between;
mix-blend-mode:difference;
}

.nav-logo{
font-family:'EB Garamond',serif;
letter-spacing:.12em;
text-decoration:none;
color:white;
}

.nav-links{
display:flex;
gap:40px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:.8rem;
opacity:.6;
letter-spacing:.18em;
text-transform:uppercase;
}

.nav-links a.active,
.nav-links a:hover{opacity:1;}

/* GALLERY */
#gallery-main{
height:100vh;
position:relative;
overflow:hidden;
padding-top:120px;
transition:opacity .3s ease;
}

#image-track{
display:flex;
gap:4vmin;
position:absolute;
left:50%;
top:50%;
transform:translate(0%, -50%);
will-change:transform;
user-select:none;
touch-action:pan-y;
cursor:grab;
}

#image-track:active{
cursor:grabbing;
}

#image-track > .image{
width:34vmin;
height:48vmin;
object-fit:cover;
object-position:100% center;
border-radius:6px;
transition:transform .35s ease, filter .35s ease;
will-change:transform, object-position;
}

#image-track > .image:hover{
transform:scale(1.03);
filter:brightness(1.05);
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:opacity .4s ease;
}

#lightbox.active{
opacity:1;
pointer-events:all;
}

#lightbox img{
max-width:90vw;
max-height:85vh;
transform:scale(.9);
transition:transform .4s ease;
}

#lightbox.active img{
transform:scale(1);
}

body.lightbox-open #gallery-main{
opacity:.3;
transition:opacity .3s ease;
}

/* MOBILE */
@media(max-width:900px){
.nav-links{display:none;}
#gallery-main { padding-top: 100px; }
#image-track > .image{
width:56vw;
height:72vw;
}
}
</style>
</head>

<body>

<nav>

<section id="gallery-main">
<div id="image-track" data-mouse-down-at="0" data-prev-percentage="0" data-percentage="0">

<!-- LIGHTBOX -->
<div id="lightbox">
<img id="lightbox-img">
</div>

<script>
const track = document.getElementById("image-track");
let dragged = false;

const handleOnDown = pointerX => {
  dragged = false;
  track.dataset.mouseDownAt = pointerX;
};

const handleOnUp = () => {
  track.dataset.mouseDownAt = "0";
  track.dataset.prevPercentage = track.dataset.percentage || "0";
};

const handleOnMove = pointerX => {
  if (track.dataset.mouseDownAt === "0") return;

  const mouseDelta = parseFloat(track.dataset.mouseDownAt) - pointerX;
  const maxDelta = window.innerWidth / 2;

  if (Math.abs(mouseDelta) > 4) {
    dragged = true;
  }

  const percentage = (mouseDelta / maxDelta) * -100;
  const nextPercentageUnconstrained =
    parseFloat(track.dataset.prevPercentage || "0") + percentage;
  const nextPercentage = Math.max(Math.min(nextPercentageUnconstrained, 0), -100);

  track.dataset.percentage = nextPercentage;

  track.animate(
    {
      transform: `translate(${nextPercentage}%, -50%)`
    },
    { duration: 1200, fill: "forwards", easing: "ease" }
  );

  for (const image of track.getElementsByClassName("image")) {
    image.animate(
      {
        objectPosition: `${100 + nextPercentage}% center`
      },
      { duration: 1200, fill: "forwards", easing: "ease" }
    );
  }
};

track.addEventListener("mousedown", e => handleOnDown(e.clientX));
track.addEventListener("touchstart", e => handleOnDown(e.touches[0].clientX), { passive: true });

window.addEventListener("mouseup", handleOnUp);
window.addEventListener("touchend", handleOnUp);

window.addEventListener("mousemove", e => handleOnMove(e.clientX));
window.addEventListener("touchmove", e => handleOnMove(e.touches[0].clientX), { passive: true });

/* LIGHTBOX */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

document.querySelectorAll(".image").forEach(img => {
  img.addEventListener("click", () => {
    if (dragged) return;
    lightbox.classList.add("active");
    lightboxImg.src = img.src;
    document.body.classList.add("lightbox-open");
  });
});

lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
  document.body.classList.remove("lightbox-open");
});

window.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    lightbox.classList.remove("active");
    document.body.classList.remove("lightbox-open");
  }
});
</script>
