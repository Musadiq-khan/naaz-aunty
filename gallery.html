  <main id="main-content">
    <h1 class="sr-only">Photo Gallery &mdash; Dr. Aishath Ali Naaz</h1>
    <section id="gallery-main">
      <div id="image-track">
        <!-- Images populated via JavaScript below -->
        <!-- TODO: Replace stock Unsplash images with real photos of Dr. Naaz -->
      </div>
    </section>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-label="Image lightbox" aria-modal="true">
    <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
    <img id="lightbox-img" alt="">

  <footer>&copy; 2025 &middot; Dr. Aishath Ali Naaz &middot; Consultant Clinical Psychologist &middot; Maldives</footer>

  <script src="js/global.js"></script>
  <script>
    /* ---- Gallery-specific JavaScript ---- */
    var track = document.getElementById('image-track');

    /* TODO: Replace these stock images with real photos of Dr. Naaz —
       conference speaking, MIPSTAR facility, TV appearances, awards, etc. */
    var galleryImages = [
      { id: '1529156069898-49953e39b3ac', alt: 'Soft pastel flowers on a dark background' },
      { id: '1500530855697-b586d89ba3ee', alt: 'Mountain landscape at sunrise' },
      { id: '1521737604893-d14cc237f11d', alt: 'Team collaboration around a table' },
      { id: '1544717305-2782549b5136', alt: 'Portrait in warm natural light' },
      { id: '1492724441997-5dc865305da7', alt: 'Creative studio workspace' },
      { id: '1507525428034-b723cf961d3e', alt: 'Ocean waves at golden hour' },
      { id: '1470770841072-f978cf4d019e', alt: 'Misty forest and lake' },
      { id: '1501785888041-af3ef285b470', alt: 'Snowy mountain range panorama' },
      { id: '1491553895911-0055eca6402d', alt: 'Desert road under dramatic sky' },
      { id: '1500534314209-a25ddb2bd429', alt: 'Field landscape with clouds' }
    ];

    var buildUnsplashUrl = function (id, width, quality) {
      width = width || 1200;
      quality = quality || 72;
      return 'https://images.unsplash.com/photo-' + id + '?auto=format&fit=crop&w=' + width + '&q=' + quality;
    };

    var createImageNode = function (data, index) {
      var img = document.createElement('img');
      img.className = 'image';
      img.alt = data.alt;
      img.draggable = false;
      img.width = 480;
      img.height = 680;
      img.loading = index < 2 ? 'eager' : 'lazy';
      img.decoding = 'async';
      if (index === 0) img.fetchPriority = 'high';
      img.src = buildUnsplashUrl(data.id, 1200, 72);
      img.srcset = buildUnsplashUrl(data.id, 600, 70) + ' 600w, ' + buildUnsplashUrl(data.id, 1200, 72) + ' 1200w';
      img.sizes = '(max-width: 900px) 56vw, 34vmin';
      return img;
    };

    var fragment = document.createDocumentFragment();
    galleryImages.forEach(function (image, index) {
      fragment.appendChild(createImageNode(image, index));
    });
    track.appendChild(fragment);

    /* ---- Drag Scroll ---- */
    var dragged = false;
    var pointerDownAt = 0;
    var prevPercentage = 0;
    var targetPercentage = 0;
    var currentPercentage = 0;
    var rafId = null;

    var clamp = function (num, min, max) {
      return Math.max(min, Math.min(num, max));
    };

    var renderTrack = function () {
      currentPercentage += (targetPercentage - currentPercentage) * 0.14;
      if (Math.abs(targetPercentage - currentPercentage) < 0.01) {
        currentPercentage = targetPercentage;
      }

      track.style.transform = 'translate(' + currentPercentage + '%, -50%)';
      var objectX = 100 + currentPercentage;
      var images = track.getElementsByClassName('image');
      for (var i = 0; i < images.length; i++) {
        images[i].style.objectPosition = objectX + '% center';
      }

      if (currentPercentage !== targetPercentage) {
        rafId = requestAnimationFrame(renderTrack);
      } else {
        rafId = null;
      }
    };

    var scheduleRender = function () {
      if (rafId === null) {
        rafId = requestAnimationFrame(renderTrack);
      }
    };

    track.addEventListener('pointerdown', function (e) {
      dragged = false;
      pointerDownAt = e.clientX;
    });

    window.addEventListener('pointerup', function () {
      pointerDownAt = 0;
      prevPercentage = targetPercentage;
    });

    window.addEventListener('pointermove', function (e) {
      if (!pointerDownAt) return;
      var delta = pointerDownAt - e.clientX;
      if (Math.abs(delta) > 4) dragged = true;
      var maxDelta = window.innerWidth / 2;
      var percentage = (delta / maxDelta) * -100;
      targetPercentage = clamp(prevPercentage + percentage, -100, 0);
      scheduleRender();
    });

    /* ---- Lightbox ---- */
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var lightboxClose = document.querySelector('.lightbox-close');

    var closeLightbox = function () {
      lightbox.classList.remove('active');
      document.body.classList.remove('lightbox-open');
    };

    track.addEventListener('click', function (e) {
      var img = e.target.closest('.image');
      if (!img || dragged) return;
      lightbox.classList.add('active');
      lightboxImg.src = img.currentSrc || img.src;
      lightboxImg.alt = img.alt;
      document.body.classList.add('lightbox-open');
    });

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });

    if (lightboxClose) {
      lightboxClose.addEventListener('click', closeLightbox);
    }

    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeLightbox();
    });

    scheduleRender();
  </script>
</body>
</html>
