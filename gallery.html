<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--black:#0a0a0a;
--white:#ffffff;
--accent:#b8a070;
--mid:#888880;
}

body{
font-family:'Jost',sans-serif;
background:var(--black);
color:var(--white);
overflow:hidden;
min-height:100vh;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
padding:28px 56px;
display:flex;
align-items:center;
justify-content:space-between;
mix-blend-mode:difference;
}

.nav-logo{
font-family:'EB Garamond',serif;
font-size:.95rem;
font-weight:400;
letter-spacing:.12em;
text-transform:uppercase;
text-decoration:none;
color:white;
}

.nav-links{
display:flex;
gap:36px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:.72rem;
font-weight:300;
opacity:.6;
letter-spacing:.18em;
text-transform:uppercase;
}

.nav-links a.active,
.nav-links a:hover{opacity:1;}

/* GALLERY */
#gallery-main{
height:100vh;
position:relative;
overflow:hidden;
padding-top:120px;
transition:opacity .3s ease;
}

#image-track{
display:flex;
gap:4vmin;
position:absolute;
left:50%;
top:50%;
transform:translate(0%, -50%);
will-change:transform;
user-select:none;
touch-action:pan-y;
cursor:grab;
contain:layout paint style;
}

#image-track:active{
cursor:grabbing;
}

#image-track > .image{
width:34vmin;
height:48vmin;
object-fit:cover;
object-position:100% center;
border-radius:6px;
transition:transform .35s ease, filter .35s ease;
will-change:transform, object-position;
background:rgba(255,255,255,.06);
}

#image-track > .image:hover{
transform:scale(1.03);
filter:brightness(1.05);
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:opacity .4s ease;
}

#lightbox.active{
opacity:1;
pointer-events:all;
}

#lightbox img{
max-width:90vw;
max-height:85vh;
transform:scale(.9);
transition:transform .4s ease;
}

#lightbox.active img{
transform:scale(1);
}

body.lightbox-open #gallery-main{
opacity:.3;
transition:opacity .3s ease;
}

/* MOBILE */
@media(max-width:900px){
nav { padding:20px 24px; }
.nav-links{display:none;}
#gallery-main { padding-top: 100px; }
#image-track > .image{
width:56vw;
height:72vw;
}
}
</style>
</head>

<body>

<nav>
<a href="index.html" class="nav-logo">Dr. Aishath Ali Naaz</a>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="gallery.html" class="active">Gallery</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<section id="gallery-main">
<div id="image-track">
</div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox">
<img id="lightbox-img">
</div>

<script>
const track = document.getElementById("image-track");
const galleryImages = [
  { id: "1529156069898-49953e39b3ac", alt: "Soft pastel flowers on a dark background" },
  { id: "1500530855697-b586d89ba3ee", alt: "Mountain landscape at sunrise" },
  { id: "1521737604893-d14cc237f11d", alt: "Team collaboration around a table" },
  { id: "1544717305-2782549b5136", alt: "Portrait in warm natural light" },
  { id: "1492724441997-5dc865305da7", alt: "Creative studio workspace" },
  { id: "1507525428034-b723cf961d3e", alt: "Ocean waves at golden hour" },
  { id: "1470770841072-f978cf4d019e", alt: "Misty forest and lake" },
  { id: "1501785888041-af3ef285b470", alt: "Snowy mountain range panorama" },
  { id: "1491553895911-0055eca6402d", alt: "Desert road under dramatic sky" },
  { id: "1500534314209-a25ddb2bd429", alt: "Field landscape with clouds" }
];

const buildUnsplashUrl = (id, width = 1200, quality = 72) =>
  `https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=${width}&q=${quality}`;

const createImageNode = ({ id, alt }, index) => {
  const img = document.createElement("img");
  img.className = "image";
  img.alt = alt;
  img.draggable = false;
  img.width = 480;
  img.height = 680;
  img.loading = index < 2 ? "eager" : "lazy";
  img.decoding = "async";
  if (index === 0) {
    img.fetchPriority = "high";
  }
  img.src = buildUnsplashUrl(id, 1200, 72);
  img.srcset = `${buildUnsplashUrl(id, 600, 70)} 600w, ${buildUnsplashUrl(id, 1200, 72)} 1200w`;
  img.sizes = "(max-width: 900px) 56vw, 34vmin";
  return img;
};

const initGallery = () => {
  const fragment = document.createDocumentFragment();
  galleryImages.forEach((image, index) => fragment.appendChild(createImageNode(image, index)));
  track.appendChild(fragment);
};

initGallery();

let dragged = false;
let pointerDownAt = 0;
let prevPercentage = 0;
let targetPercentage = 0;
let currentPercentage = 0;
let rafId = null;

const clamp = (num, min, max) => Math.max(min, Math.min(num, max));

const renderTrack = () => {
  currentPercentage += (targetPercentage - currentPercentage) * 0.14;

  if (Math.abs(targetPercentage - currentPercentage) < 0.01) {
    currentPercentage = targetPercentage;
  }

  track.style.transform = `translate(${currentPercentage}%, -50%)`;
  const objectX = 100 + currentPercentage;
  const images = track.getElementsByClassName("image");
  for (const image of images) {
    image.style.objectPosition = `${objectX}% center`;
  }

  if (currentPercentage !== targetPercentage) {
    rafId = requestAnimationFrame(renderTrack);
  } else {
    rafId = null;
  }
};

const scheduleRender = () => {
  if (rafId === null) {
    rafId = requestAnimationFrame(renderTrack);
  }
};

const handleOnDown = pointerX => {
  dragged = false;
  pointerDownAt = pointerX;
};

const handleOnUp = () => {
  pointerDownAt = 0;
  prevPercentage = targetPercentage;
};

const handleOnMove = pointerX => {
  if (!pointerDownAt) return;

  const delta = pointerDownAt - pointerX;
  if (Math.abs(delta) > 4) {
    dragged = true;
  }

  const maxDelta = window.innerWidth / 2;
  const percentage = (delta / maxDelta) * -100;
  targetPercentage = clamp(prevPercentage + percentage, -100, 0);
  scheduleRender();
};

track.addEventListener("pointerdown", e => handleOnDown(e.clientX));
window.addEventListener("pointerup", handleOnUp);
window.addEventListener("pointermove", e => handleOnMove(e.clientX));

/* LIGHTBOX */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

track.addEventListener("click", e => {
  const img = e.target.closest(".image");
  if (!img || dragged) return;
  lightbox.classList.add("active");
  lightboxImg.src = img.currentSrc || img.src;
  document.body.classList.add("lightbox-open");
});

lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
  document.body.classList.remove("lightbox-open");
});

window.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    lightbox.classList.remove("active");
    document.body.classList.remove("lightbox-open");
  }
});

scheduleRender();
</script>

</body>
</html>
