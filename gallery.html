    /* Distribute images across rows (6 images per row) */
    var IMAGES_PER_ROW = 6;
    var ROW_COUNT = 9;

    var buildUnsplashUrl = function (id, width, quality) {
      width = width || 1200;
      quality = quality || 72;
      return 'https://images.unsplash.com/photo-' + id + '?auto=format&fit=crop&w=' + width + '&q=' + quality;
    };

    var createImageNode = function (data, isEager) {
      var img = document.createElement('img');
      img.className = 'image';
      img.alt = data.alt;
      img.draggable = false;
      img.width = 480;
      img.height = 680;
      img.loading = isEager ? 'eager' : 'lazy';
      img.decoding = 'async';
      img.src = buildUnsplashUrl(data.id, 1200, 72);
      img.srcset = buildUnsplashUrl(data.id, 600, 70) + ' 600w, ' + buildUnsplashUrl(data.id, 1200, 72) + ' 1200w';
      img.sizes = '(max-width: 900px) 56vw, 30vmin';
      return img;
    };

    /* ---- Row Titles ---- */
    var rowTitles = [
      'Row Title 1',
      'Row Title 2',
      'Row Title 3',
      'Row Title 4',
      'Row Title 5',
      'Row Title 6',
      'Row Title 7',
      'Row Title 8',
      'Row Title 9'
    ];

    /* ---- Build Rows ---- */
    var trackStates = [];
    var imageIndex = 0;

    for (var r = 0; r < ROW_COUNT; r++) {
      /* Wrapper */
      var rowEl = document.createElement('div');
      rowEl.className = 'gallery-row';

      /* Title */
      var titleEl = document.createElement('h2');
      titleEl.className = 'row-title';
      titleEl.textContent = rowTitles[r] || 'Gallery';
      rowEl.appendChild(titleEl);

      /* Track (unchanged) */
      var trackEl = document.createElement('div');
      trackEl.className = 'image-track';
      trackEl.setAttribute('data-row', r);

      var frag = document.createDocumentFragment();
      for (var i = 0; i < IMAGES_PER_ROW; i++) {
        var imgData = allImages[imageIndex % allImages.length];
        var isEager = r === 0 && i < 2;
        frag.appendChild(createImageNode(imgData, isEager));
        imageIndex++;
      }
      trackEl.appendChild(frag);
      rowEl.appendChild(trackEl);
      galleryMain.appendChild(rowEl);

      trackStates.push({
        el: trackEl,
        dragged: false,
        pointerDownAt: 0,
        prevPercentage: 0,
        targetPercentage: 0,
        currentPercentage: 0,
        rafId: null
      });
    }

    /* ---- Shared Helpers ---- */
    var clamp = function (num, min, max) {
      return Math.max(min, Math.min(num, max));
    };

    var createRenderer = function (state) {
      return function render() {
        state.currentPercentage += (state.targetPercentage - state.currentPercentage) * 0.14;
        if (Math.abs(state.targetPercentage - state.currentPercentage) < 0.01) {
          state.currentPercentage = state.targetPercentage;
        }

        state.el.style.transform = 'translateX(' + state.currentPercentage + '%)';
        var objectX = 100 + state.currentPercentage;
        var images = state.el.getElementsByClassName('image');
        for (var j = 0; j < images.length; j++) {
          images[j].style.objectPosition = objectX + '% center';
        }

        if (state.currentPercentage !== state.targetPercentage) {
          state.rafId = requestAnimationFrame(render);
        } else {
          state.rafId = null;
        }
      };
    };

    var scheduleRender = function (state) {
      if (state.rafId === null) {
        state.rafId = requestAnimationFrame(createRenderer(state));
      }
    };

    /* ---- Per-Row Drag Handling ---- */
    var activeState = null;

    galleryMain.addEventListener('pointerdown', function (e) {
      var trackEl = e.target.closest('.image-track');
      if (!trackEl) return;

      var row = parseInt(trackEl.getAttribute('data-row'), 10);
      activeState = trackStates[row];
      activeState.dragged = false;
      activeState.pointerDownAt = e.clientX;
    });

    window.addEventListener('pointerup', function () {
      if (!activeState) return;
      activeState.pointerDownAt = 0;
      activeState.prevPercentage = activeState.targetPercentage;
      activeState = null;
    });

    window.addEventListener('pointermove', function (e) {
      if (!activeState || !activeState.pointerDownAt) return;
      var delta = activeState.pointerDownAt - e.clientX;
      if (Math.abs(delta) > 4) activeState.dragged = true;
      var maxDelta = window.innerWidth / 2;
      var percentage = (delta / maxDelta) * -100;
      activeState.targetPercentage = clamp(activeState.prevPercentage + percentage, -100, 0);
      scheduleRender(activeState);
    });

    /* ---- Entrance Animation via IntersectionObserver ---- */
    if ('IntersectionObserver' in window) {
      var entranceObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            entranceObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

      trackStates.forEach(function (state) {
        entranceObserver.observe(state.el);
      });
    } else {
      /* Fallback: show all rows immediately */
      trackStates.forEach(function (state) {
        state.el.classList.add('visible');
      });
    }

    /* ---- Lightbox ---- */
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var lightboxClose = document.querySelector('.lightbox-close');

    var closeLightbox = function () {
      lightbox.classList.remove('active');
      document.body.classList.remove('lightbox-open');
    };

    galleryMain.addEventListener('click', function (e) {
      var img = e.target.closest('.image');
      if (!img) return;

      /* Find which row this image belongs to */
      var trackEl = img.closest('.image-track');
      if (!trackEl) return;
      var row = parseInt(trackEl.getAttribute('data-row'), 10);
      var state = trackStates[row];
      if (state.dragged) return;

      lightbox.classList.add('active');
      lightboxImg.src = img.currentSrc || img.src;
      lightboxImg.alt = img.alt;
      document.body.classList.add('lightbox-open');
    });

    lightbox.addEventListener('click', function (e) {
      if (e.target === lightbox) closeLightbox();
    });

    if (lightboxClose) {
      lightboxClose.addEventListener('click', closeLightbox);
    }

    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeLightbox();
    });

    /* Initial render for first row */
    scheduleRender(trackStates[0]);
  </script>
