<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Dr. Aishath Ali Naaz</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--black:#0a0a0a;
--white:#ffffff;
--accent:#b8a070;
--mid:#888880;
}

body{
font-family:'Jost',sans-serif;
background:var(--black);
color:var(--white);
overflow-x:hidden;
cursor: none;
}

@media (pointer: fine) {
  body { cursor: none; }
  .cursor, .cursor-ring { display: block; }
}
@media (pointer: coarse) {
  body { cursor: auto; }
  .cursor, .cursor-ring { display: none; }
}

.cursor {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: transform 0.1s, width 0.3s, height 0.3s;
}

.cursor-ring {
  width: 32px;
  height: 32px;
  border: 1px solid rgba(184, 160, 112, 0.4);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: transform 0.15s ease-out, width 0.3s, height 0.3s;
}

.wave-ripple {
  position: fixed;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  pointer-events: none;
  transform: translate(-50%, -50%);
  border: 1px solid rgba(184, 160, 112, 0.25);
  animation: waveExpand 0.8s ease-out forwards;
  z-index: 9997;
}

@keyframes waveExpand {
  0% { opacity: 0.5; transform: translate(-50%, -50%) scale(0.5); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(3); }
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
padding:30px 5vw;
display:flex;
justify-content:space-between;
mix-blend-mode:difference;
}

.nav-logo{
font-family:'EB Garamond',serif;
letter-spacing:.12em;
text-decoration:none;
color:white;
}

.nav-links{
display:flex;
gap:40px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:.8rem;
opacity:.6;
letter-spacing:.18em;
text-transform:uppercase;
}

.nav-links a.active,
.nav-links a:hover{opacity:1;}

/* GALLERY */
#gallery-main{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:18vh;
padding:120px 0;
position:relative;
overflow-x:hidden;
}

.track-wrapper{
position:relative;
width:100%;
height:48vmin;
}

.track-title{
position:absolute;
left:8vw;
top:-40px;
font-family:'EB Garamond',serif;
letter-spacing:.2em;
text-transform:uppercase;
color:var(--accent);
}

.image-track{
display:flex;
gap:4vmin;
position:absolute;
left:50%;
top:50%;
transform:translate3d(0,-50%,0);
will-change:transform;
user-select:none;
}

.image{
width:34vmin;
height:48vmin;
object-fit:cover;
border-radius:6px;
transition:transform .3s ease;
}

.image:hover{
transform:scale(1.05);
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
opacity:0;
pointer-events:none;
transition:opacity .4s ease;
}

#lightbox.active{
opacity:1;
pointer-events:all;
}

#lightbox img{
max-width:90vw;
max-height:85vh;
transform:scale(.9);
transition:transform .4s ease;
}

#lightbox.active img{
transform:scale(1);
}

body.lightbox-open #gallery-main{
filter:blur(6px) brightness(.4);
}

/* MOBILE */
@media(max-width:900px){
.nav-links{display:none;}
#gallery-main { gap: 10vh; padding: 100px 0; }
.track-wrapper { height: 40vh; }
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

</div>

<script>

/* SMOOTH DRAG SYSTEM */
const tracks = document.querySelectorAll(".image-track");

tracks.forEach(track => {
  let mouseDownAt = 0;
  let percentage = 0;
  let targetPercentage = 0;
  let prevPercentage = 0;

  /* Mouse down */
  track.addEventListener("mousedown", e => {
    mouseDownAt = e.clientX;
  });

  /* Mouse up */
  window.addEventListener("mouseup", () => {
    mouseDownAt = 0;
    prevPercentage = targetPercentage;
  });

  /* Mouse move */
  window.addEventListener("mousemove", e => {
    if (mouseDownAt === 0) return;

    const delta = mouseDownAt - e.clientX;
    const maxDelta = window.innerWidth / 2;

    const movePercentage = (delta / maxDelta) * -100;
    targetPercentage = Math.max(Math.min(prevPercentage + movePercentage, 0), -100);
  });

  /* Touch support */
  track.addEventListener("touchstart", e => {
    mouseDownAt = e.touches[0].clientX;
  });

  window.addEventListener("touchend", () => {
    mouseDownAt = 0;
    prevPercentage = targetPercentage;
  });

  window.addEventListener("touchmove", e => {
    if (mouseDownAt === 0) return;

    const delta = mouseDownAt - e.touches[0].clientX;
    const maxDelta = window.innerWidth / 2;

    const movePercentage = (delta / maxDelta) * -100;
    targetPercentage = Math.max(Math.min(prevPercentage + movePercentage, 0), -100);
  });

  /* Smooth animation loop */
  function animate() {
    percentage += (targetPercentage - percentage) * 0.08;
    track.style.transform = `translate3d(${percentage}%, -50%, 0)`;
    requestAnimationFrame(animate);
  }

  animate();
});

/* LIGHTBOX */
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

document.querySelectorAll(".image").forEach(img=>{
img.addEventListener("click",()=>{
lightbox.classList.add("active");
lightboxImg.src=img.src;
document.body.classList.add("lightbox-open");
});
});

lightbox.addEventListener("click",()=>{
lightbox.classList.remove("active");
document.body.classList.remove("lightbox-open");
});

window.addEventListener("keydown",e=>{
if(e.key==="Escape"){
lightbox.classList.remove("active");
document.body.classList.remove("lightbox-open");
}
});
/* CURSOR TRACKING */
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  if (cursor) {
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  }
});

(function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  if (ring) {
    ring.style.left = rx + 'px';
    ring.style.top = ry + 'px';
  }
  requestAnimationFrame(animRing);
})();

/* RIPPLE EFFECT */
let lastRippleTime = 0;
document.addEventListener("mousemove", function(e) {
  const now = Date.now();
  if (now - lastRippleTime > 80) {
    const ripple = document.createElement("div");
    ripple.className = "wave-ripple";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    document.body.appendChild(ripple);
    setTimeout(() => { ripple.remove(); }, 800);
    lastRippleTime = now;
  }
});
</script>
