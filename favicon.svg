<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0a0a0a"/>
  <!-- Subtle inner border for refinement -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#b8a070" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Letter N — styled to evoke EB Garamond -->
  <text
    x="16"
    y="23"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-weight="400"
    fill="#b8a070"
    letter-spacing="-0.5"
  >N</text>
  <!-- Thin gold underline accent -->
  <line x1="9" y1="26.5" x2="23" y2="26.5" stroke="#b8a070" stroke-width="0.75" stroke-opacity="0.6"/>
</svg>
